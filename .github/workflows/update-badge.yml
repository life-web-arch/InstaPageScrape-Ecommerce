name: Update Download Badge Version

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update version in SVG
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s/Download InstaPageScrape v[0-9][0-9]*\.[0-9][0-9]*/Download InstaPageScrape ${VERSION}/" assets/download_btn.svg
          echo "Updated SVG to $VERSION"
          grep "Download" assets/download_btn.svg

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/download_btn.svg
          git diff --staged --quiet || git commit -m "chore: update download badge to ${{ github.event.release.tag_name }}"
          git push origin main
