name: Update Download Badge Version

on:
  release:
    types: [published]

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in SVG
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          sed -i "s/{{VERSION}}/$VERSION/g" assets/download_btn.svg

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/download_btn.svg
          git commit -m "chore: update download badge to ${{ github.event.release.tag_name }}"
          git push
