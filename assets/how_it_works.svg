<svg xmlns="http://www.w3.org/2000/svg" width="760" height="200" viewBox="0 0 760 200">
  <defs>
    <style>
      @keyframes fadeSlideIn {
        0%   { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes arrowPulse {
        0%, 100% { opacity: 0.4; transform: scaleX(0.85); }
        50%       { opacity: 1;   transform: scaleX(1); }
      }
      @keyframes iconBounce {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-5px); }
      }
      .step1 { animation: fadeSlideIn 0.6s ease both; animation-delay: 0.1s; }
      .step2 { animation: fadeSlideIn 0.6s ease both; animation-delay: 0.4s; }
      .step3 { animation: fadeSlideIn 0.6s ease both; animation-delay: 0.7s; }
      .step4 { animation: fadeSlideIn 0.6s ease both; animation-delay: 1.0s; }
      .step5 { animation: fadeSlideIn 0.6s ease both; animation-delay: 1.3s; }
      .arr1  { animation: arrowPulse 1.5s ease-in-out infinite; animation-delay: 0.3s; transform-origin: center; }
      .arr2  { animation: arrowPulse 1.5s ease-in-out infinite; animation-delay: 0.6s; transform-origin: center; }
      .arr3  { animation: arrowPulse 1.5s ease-in-out infinite; animation-delay: 0.9s; transform-origin: center; }
      .arr4  { animation: arrowPulse 1.5s ease-in-out infinite; animation-delay: 1.2s; transform-origin: center; }
      .icon  { animation: iconBounce 2s ease-in-out infinite; }
    </style>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f"/>
      <stop offset="100%" stop-color="#cc0066"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="200" rx="16" fill="#0f0f0f"/>

  <!-- Step 1 -->
  <g class="step1" filter="url(#shadow)">
    <rect x="14" y="40" width="118" height="118" rx="14" fill="url(#g1)"/>
    <text x="73" y="88" font-size="32" text-anchor="middle" dominant-baseline="central" class="icon">📱</text>
    <text x="73" y="122" font-size="11" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Open Profile</text>
    <text x="73" y="138" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif">in Kiwi/Orion</text>
    <rect x="24" y="40" width="22" height="22" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="35" y="51" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial, sans-serif">1</text>
  </g>

  <!-- Arrow 1 -->
  <g class="arr1">
    <text x="148" y="102" font-size="22" text-anchor="middle" dominant-baseline="central" fill="#ff007f">▶</text>
  </g>

  <!-- Step 2 -->
  <g class="step2" filter="url(#shadow)">
    <rect x="162" y="40" width="118" height="118" rx="14" fill="url(#g2)"/>
    <text x="221" y="88" font-size="32" text-anchor="middle" dominant-baseline="central" class="icon">🔗</text>
    <text x="221" y="122" font-size="11" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Gather Links</text>
    <text x="221" y="138" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif">scroll to load posts</text>
    <rect x="172" y="40" width="22" height="22" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="183" y="51" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial, sans-serif">2</text>
  </g>

  <!-- Arrow 2 -->
  <g class="arr2">
    <text x="296" y="102" font-size="22" text-anchor="middle" dominant-baseline="central" fill="#7c3aed">▶</text>
  </g>

  <!-- Step 3 -->
  <g class="step3" filter="url(#shadow)">
    <rect x="310" y="40" width="118" height="118" rx="14" fill="url(#g3)"/>
    <text x="369" y="88" font-size="32" text-anchor="middle" dominant-baseline="central" class="icon">⚡</text>
    <text x="369" y="122" font-size="11" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Auto-Scrape</text>
    <text x="369" y="138" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif">visits every post</text>
    <rect x="320" y="40" width="22" height="22" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="331" y="51" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial, sans-serif">3</text>
  </g>

  <!-- Arrow 3 -->
  <g class="arr3">
    <text x="444" y="102" font-size="22" text-anchor="middle" dominant-baseline="central" fill="#0ea5e9">▶</text>
  </g>

  <!-- Step 4 -->
  <g class="step4" filter="url(#shadow)">
    <rect x="458" y="40" width="118" height="118" rx="14" fill="url(#g4)"/>
    <text x="517" y="88" font-size="32" text-anchor="middle" dominant-baseline="central" class="icon">🎯</text>
    <text x="517" y="122" font-size="11" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Capture Media</text>
    <text x="517" y="138" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif">images + reels</text>
    <rect x="468" y="40" width="22" height="22" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="479" y="51" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial, sans-serif">4</text>
  </g>

  <!-- Arrow 4 -->
  <g class="arr4">
    <text x="592" y="102" font-size="22" text-anchor="middle" dominant-baseline="central" fill="#10b981">▶</text>
  </g>

  <!-- Step 5 -->
  <g class="step5" filter="url(#shadow)">
    <rect x="606" y="40" width="140" height="118" rx="14" fill="url(#g5)"/>
    <text x="676" y="88" font-size="32" text-anchor="middle" dominant-baseline="central" class="icon">📦</text>
    <text x="676" y="122" font-size="11" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Export HTML</text>
    <text x="676" y="138" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif">catalog + prices</text>
    <rect x="616" y="40" width="22" height="22" rx="6" fill="rgba(0,0,0,0.3)"/>
    <text x="627" y="51" font-size="11" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="white" font-family="Arial, sans-serif">5</text>
  </g>
</svg>
