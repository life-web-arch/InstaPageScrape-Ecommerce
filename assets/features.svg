<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280">
  <defs>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.5; }
        50%       { opacity: 1; }
      }
      .f1  { animation: fadeIn 0.5s ease both; animation-delay: 0.05s; }
      .f2  { animation: fadeIn 0.5s ease both; animation-delay: 0.15s; }
      .f3  { animation: fadeIn 0.5s ease both; animation-delay: 0.25s; }
      .f4  { animation: fadeIn 0.5s ease both; animation-delay: 0.35s; }
      .f5  { animation: fadeIn 0.5s ease both; animation-delay: 0.45s; }
      .f6  { animation: fadeIn 0.5s ease both; animation-delay: 0.55s; }
      .f7  { animation: fadeIn 0.5s ease both; animation-delay: 0.65s; }
      .f8  { animation: fadeIn 0.5s ease both; animation-delay: 0.75s; }
      .glow { animation: glowPulse 2s ease-in-out infinite; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a0a12"/>
    </linearGradient>
    <filter id="featshadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <rect width="760" height="280" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="380" y="36" font-size="15" font-weight="bold" text-anchor="middle"
        fill="#ff007f" font-family="Arial, sans-serif" letter-spacing="2">✦ FEATURES ✦</text>

  <!-- Row 1: 4 cards -->
  <!-- Card 1 -->
  <g class="f1" filter="url(#featshadow)">
    <rect x="14" y="54" width="166" height="90" rx="12" fill="#1e0a14" stroke="#ff007f" stroke-width="1.5"/>
    <rect x="14" y="54" width="166" height="4" rx="2" fill="#ff007f" class="glow"/>
    <text x="36" y="88" font-size="26" dominant-baseline="central">🖼️</text>
    <text x="70" y="82" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Images + Reels</text>
    <text x="70" y="98" font-size="10" fill="#aaa" font-family="Arial, sans-serif">Page JSON extraction</text>
    <text x="70" y="112" font-size="10" fill="#aaa" font-family="Arial, sans-serif">no interception needed</text>
  </g>

  <!-- Card 2 -->
  <g class="f2" filter="url(#featshadow)">
    <rect x="194" y="54" width="166" height="90" rx="12" fill="#0d0a1e" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="194" y="54" width="166" height="4" rx="2" fill="#7c3aed" class="glow"/>
    <text x="216" y="88" font-size="26" dominant-baseline="central">📚</text>
    <text x="250" y="82" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Carousels</text>
    <text x="250" y="98" font-size="10" fill="#aaa" font-family="Arial, sans-serif">navigates all slides</text>
    <text x="250" y="112" font-size="10" fill="#aaa" font-family="Arial, sans-serif">captures every item</text>
  </g>

  <!-- Card 3 -->
  <g class="f3" filter="url(#featshadow)">
    <rect x="374" y="54" width="166" height="90" rx="12" fill="#0a1a0e" stroke="#10b981" stroke-width="1.5"/>
    <rect x="374" y="54" width="166" height="4" rx="2" fill="#10b981" class="glow"/>
    <text x="396" y="88" font-size="26" dominant-baseline="central">💰</text>
    <text x="430" y="82" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Price Detection</text>
    <text x="430" y="98" font-size="10" fill="#aaa" font-family="Arial, sans-serif">extracts ₹/Rs prices</text>
    <text x="430" y="112" font-size="10" fill="#aaa" font-family="Arial, sans-serif">ranked by value</text>
  </g>

  <!-- Card 4 -->
  <g class="f4" filter="url(#featshadow)">
    <rect x="554" y="54" width="192" height="90" rx="12" fill="#1a140a" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="554" y="54" width="192" height="4" rx="2" fill="#f59e0b" class="glow"/>
    <text x="576" y="88" font-size="26" dominant-baseline="central">📅</text>
    <text x="610" y="82" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Post Dates</text>
    <text x="610" y="98" font-size="10" fill="#aaa" font-family="Arial, sans-serif">shown on every card</text>
    <text x="610" y="112" font-size="10" fill="#aaa" font-family="Arial, sans-serif">top-right pill badge</text>
  </g>

  <!-- Row 2: 4 cards -->
  <!-- Card 5 -->
  <g class="f5" filter="url(#featshadow)">
    <rect x="14" y="160" width="166" height="90" rx="12" fill="#0a1620" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="14" y="160" width="166" height="4" rx="2" fill="#0ea5e9" class="glow"/>
    <text x="36" y="194" font-size="26" dominant-baseline="central">⚙️</text>
    <text x="70" y="188" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Filter Bar</text>
    <text x="70" y="204" font-size="10" fill="#aaa" font-family="Arial, sans-serif">Images / Reels</text>
    <text x="70" y="218" font-size="10" fill="#aaa" font-family="Arial, sans-serif">Carousels / Priced</text>
  </g>

  <!-- Card 6 -->
  <g class="f6" filter="url(#featshadow)">
    <rect x="194" y="160" width="166" height="90" rx="12" fill="#1a0a1a" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="194" y="160" width="166" height="4" rx="2" fill="#ec4899" class="glow"/>
    <text x="216" y="194" font-size="26" dominant-baseline="central">⬇️</text>
    <text x="250" y="188" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Download Buttons</text>
    <text x="250" y="204" font-size="10" fill="#aaa" font-family="Arial, sans-serif">per image &amp; video</text>
    <text x="250" y="218" font-size="10" fill="#aaa" font-family="Arial, sans-serif">one tap save</text>
  </g>

  <!-- Card 7 -->
  <g class="f7" filter="url(#featshadow)">
    <rect x="374" y="160" width="166" height="90" rx="12" fill="#0a1a14" stroke="#34d399" stroke-width="1.5"/>
    <rect x="374" y="160" width="166" height="4" rx="2" fill="#34d399" class="glow"/>
    <text x="396" y="194" font-size="26" dominant-baseline="central">📱</text>
    <text x="430" y="188" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">Android + iOS</text>
    <text x="430" y="204" font-size="10" fill="#aaa" font-family="Arial, sans-serif">Kiwi + Orion</text>
    <text x="430" y="218" font-size="10" fill="#aaa" font-family="Arial, sans-serif">Browser support</text>
  </g>

  <!-- Card 8 -->
  <g class="f8" filter="url(#featshadow)">
    <rect x="554" y="160" width="192" height="90" rx="12" fill="#1a1a0a" stroke="#facc15" stroke-width="1.5"/>
    <rect x="554" y="160" width="192" height="4" rx="2" fill="#facc15" class="glow"/>
    <text x="576" y="194" font-size="26" dominant-baseline="central">🔒</text>
    <text x="610" y="188" font-size="12" font-weight="bold" fill="white" font-family="Arial, sans-serif">100% Private</text>
    <text x="610" y="204" font-size="10" fill="#aaa" font-family="Arial, sans-serif">no data leaves</text>
    <text x="610" y="218" font-size="10" fill="#aaa" font-family="Arial, sans-serif">your device</text>
  </g>
</svg>
