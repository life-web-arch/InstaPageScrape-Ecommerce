<svg xmlns="http://www.w3.org/2000/svg" width="420" height="72" viewBox="0 0 420 72">
  <defs>
    <style>
      .btn-bg { animation: pulse 2s ease-in-out infinite; }
      .shimmer { animation: shimmer 2.5s linear infinite; }
      @keyframes pulse {
        0%   { fill: #e0006e; }
        50%  { fill: #ff3399; }
        100% { fill: #e0006e; }
      }
      @keyframes shimmer {
        0%   { transform: translateX(-180px); opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { transform: translateX(480px); opacity: 0; }
      }
    </style>
    <clipPath id="btnclip">
      <rect x="0" y="0" width="420" height="72" rx="16" ry="16"/>
    </clipPath>
    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="412" height="64" rx="18" ry="18"
        fill="#ff007f" opacity="0.25" filter="url(#glow)">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect class="btn-bg" x="0" y="0" width="420" height="72" rx="16" ry="16"/>
  <g clip-path="url(#btnclip)">
    <rect class="shimmer" x="0" y="0" width="180" height="72" fill="url(#shimmerGrad)"/>
  </g>
  <text x="210" y="37" font-size="21" font-weight="bold" text-anchor="middle"
        dominant-baseline="central" font-family="Arial, sans-serif"
        fill="white" filter="url(#glow)" letter-spacing="0.5">
    Download InstaPageScrape v2.6
  </text>
</svg>
